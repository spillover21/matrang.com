server {
    listen 80;
    server_name 72.62.114.139; # ЗАМЕНИТЕ НА ВАШ ДОМЕН (например, IP или test.nclean.space)

    # Проксирование на Quinyx Parser API (Node.js Puppeteer на порту 3001)
    location /parser-api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Проксирование на Documenso (Docker)
    location / {
        proxy_pass http://127.0.0.1:9000;
        
        # ВАЖНО: Передача реальных IP адресов
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        
        # Для WebSocket (Documenso использует WS)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
